name: desktop-release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    env:
      CI: 'true'
      HUSKY: '0'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci
        shell: bash

      - name: Build portable desktop bundle
        run: npm run build
        shell: bash

      - name: Upload portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-portable
          path: dist/packaged/*-portable.exe
          if-no-files-found: error

  publish:
    runs-on: ubuntu-latest
    needs: build
    env:
      CI: 'true'
      HUSKY: '0'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download portable artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-portable
          path: dist

      - name: Prepare source archive
        shell: bash
        run: |
          mkdir -p dist
          git archive --format=zip --output dist/source.zip HEAD

      - name: Resolve project version
        id: version
        shell: bash
        run: |
          VERSION=$(node -pe "require('./package.json').version")
          RELEASE_TAG="v${VERSION}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "release_tag=${RELEASE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Resolve release range
        id: release-range
        shell: bash
        run: |
          git fetch --tags --prune
          LAST_TAG=$(git tag --list 'v*' --sort=-v:refname | head -n 1)
          if [ -z "$LAST_TAG" ]; then
            BASE_SHA=$(git rev-list --max-parents=0 HEAD | tail -n 1)
          else
            BASE_SHA=$LAST_TAG
          fi
          echo "base_sha=$BASE_SHA" >> "$GITHUB_OUTPUT"

      - name: Build release notes by category
        id: notes
        shell: bash
        run: |
          BASE_SHA="${{ steps.release-range.outputs.base_sha }}"
          CHANGELOG=""
          TOTAL_COMMITS=0
          REPO_URL="https://github.com/${GITHUB_REPOSITORY}"

          declare -A buckets
          declare -A counts
          while IFS='|' read -r sha subject; do
            [ -z "$subject" ] && continue
            type=$(printf '%s' "$subject" | awk -F': ' '{print $1}')
            type=${type%%(*}
            type=$(printf '%s' "$type" | tr '[:upper:]' '[:lower:]' | tr -d ' ')
            case "$type" in
              feat|feature)
                key="features"
                ;;
              fix|bugfix|hotfix)
                key="fixes"
                ;;
              perf|performance)
                key="performance"
                ;;
              refactor|refactoring)
                key="refactor"
                ;;
              docs|doc)
                key="docs"
                ;;
              test|tests)
                key="tests"
                ;;
              chore|ci|build|builds)
                key="maintenance"
                ;;
              revert)
                key="reverts"
                ;;
              *)
                key="other"
                ;;
            esac

            display_subject="$subject"
            if [[ "$subject" == *": "* ]]; then
              prefix="${subject%%:*}"
              message="${subject#*: }"
              scope=""
              if [[ "$prefix" == *"("*")" ]]; then
                scope="${prefix#*(}"
                scope="${scope%)}"
              fi
              if [ -n "$scope" ]; then
                display_subject="[$scope] $message"
              else
                display_subject="$message"
              fi
            fi

            buckets["$key"]+="- ${display_subject} ([${sha:0:7}](${REPO_URL}/commit/$sha))"$'\n'
            counts["$key"]=$(( ${counts["$key"]:-0} + 1 ))
            TOTAL_COMMITS=$((TOTAL_COMMITS + 1))
          done < <(git log --no-merges --pretty=format:"%H|%s" "$BASE_SHA"..HEAD)

          add_section() {
            local title="$1"
            local key="$2"
            local entries="${buckets[$key]}"
            local count="${counts[$key]:-0}"
            if [ "$count" -gt 0 ]; then
              CHANGELOG+="### ${title} (${count})"$'\n'$'\n'
              CHANGELOG+="${entries}"$'\n'
            fi
          }

          add_section "Features" "features"
          add_section "Fixes" "fixes"
          add_section "Refactors" "refactor"
          add_section "Performance" "performance"
          add_section "Documentation" "docs"
          add_section "Tests" "tests"
          add_section "Maintenance" "maintenance"
          add_section "Reverts" "reverts"
          add_section "Other" "other"

          if [ "$TOTAL_COMMITS" -eq 0 ]; then
            CHANGELOG="No relevant commits detected for this release."$'\n'
          fi

          RELEASE_BODY=""
          RELEASE_BODY+="## Changes"$'\n'$'\n'
          if [ "$TOTAL_COMMITS" -gt 0 ]; then
            RELEASE_BODY+="- Included commits: ${TOTAL_COMMITS}"$'\n'
            RELEASE_BODY+="- Range: \`${BASE_SHA:0:7}..${GITHUB_SHA:0:7}\`"$'\n'$'\n'
          fi
          RELEASE_BODY+="${CHANGELOG}"$'\n'
          RELEASE_BODY+="## Artifacts"$'\n'
          RELEASE_BODY+="- Windows portable executable (.exe)"$'\n'
          RELEASE_BODY+="- Source zip"$'\n'
          printf 'release_body<<EOF\n%s\nEOF\n' "$RELEASE_BODY" >> "$GITHUB_OUTPUT"

      - name: Skip if tag already exists
        id: tag-guard
        shell: bash
        run: |
          if git rev-parse "${{ steps.version.outputs.release_tag }}" >/dev/null 2>&1; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish GitHub release
        if: steps.tag-guard.outputs.skip == 'false'
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.version.outputs.release_tag }}
          name: Video Merger Desktop ${{ steps.version.outputs.release_tag }}
          draft: false
          prerelease: false
          body: ${{ steps.notes.outputs.release_body }}
          files: |
            dist/*-portable.exe
            dist/source.zip
